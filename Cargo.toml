[package]
name = "rust-template-output"
version = "0.1.0"
edition = "2021"
default-run = "rust-template-output"
rust-version = "1.63.0"

[features]
test_feature_1 = []

[dependencies]
bytes = "1.6.1"
derive_builder = "0.20.0"
either = "1.13.0"
futures = "0.3.30"
mockall_double = "0.3.1"
paste = "1.0.15"
reqwest = { version = "0.12.5", features = ["json", "stream"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
strum = { version = "0.26.3", features = ["derive"] }
thiserror = "1.0.62"
tokio = { version = "1.38.0", features = ["full"] }

[dev-dependencies]
anyhow = "1.0.86"
assert_matches = "1.5.0"
itertools = "0.13.0"
mockall = "0.12.1"
serial_test = "3.1.1"
wiremock = "0.6.0"
wiremock_logical_matchers = "0.6.0"

[build-dependencies]
rustc_version = "0.4.0"
