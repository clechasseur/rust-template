[package]
name = "rust-template-output"
version = "0.1.0"
edition = "2021"
default-run = "rust-template-output"
rust-version = "1.70.0"

[features]
test_feature_1 = []

[dependencies]
bytes = "1.7.1"
derive_builder = "0.20.1"
either = "1.13.0"
futures = "0.3.30"
mockall_double = "0.3.1"
paste = "1.0.15"
reqwest = { version = "0.12.7", features = ["json", "stream"] }
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
strum = { version = "0.26.3", features = ["derive"] }
thiserror = "1.0.63"
tokio = { version = "1.40.0", features = ["full"] }

[dev-dependencies]
anyhow = "1.0.89"
assert_matches = "1.5.0"
itertools = "0.13.0"
mockall = "0.13.0"
serial_test = "3.1.1"
wiremock = "0.6.2"
wiremock_logical_matchers = "0.6.0"

[build-dependencies]
rustc_version = "0.4.1"
