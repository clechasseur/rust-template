[package]
name = "rust-template-output"
version = "0.1.0"
edition = "2021"
default-run = "rust-template-output"
rust-version = "1.63.0"

[features]
test_feature_1 = []

[dependencies]
bytes = "1.5.0"
derive_builder = "0.20.0"
either = "1.10.0"
futures = "0.3.30"
mockall_double = "0.3.1"
paste = "1.0.14"
reqwest = { version = "0.11.24", features = ["json", "stream"] }
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
strum = "0.26.1"
strum_macros = "0.26.1"
thiserror = "1.0.57"
tokio = { version = "1.36.0", features = ["full"] }

[dev-dependencies]
anyhow = "1.0.80"
assert_matches = "1.5.0"
itertools = "0.12.1"
mockall = "0.12.1"
serial_test = "3.0.0"
wiremock = "0.6.0"
wiremock_logical_matchers = "0.6.0"

[build-dependencies]
rustc_version = "0.4.0"
